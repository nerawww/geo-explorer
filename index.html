<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Explorer</title>
    <link rel="stylesheet" href="./style.css">
    <script defer type="module" src="./main.js"></script>
</head>

<body>
    <header>
        <h1>🌍 Geo Explorer</h1>
        <p>Découvrez les pays du monde entier</p>
    </header>

    <main>
        <!-- Section de recherche - Dév 1 -->
        <section class="search-section">
            <form>
                <label for="country-input">Rechercher un pays</label>
                <div class="search-input-group">
                    <input type="text" id="country-input" name="country" placeholder="Ex: France, Canada, Japon...">
                    <button type="submit" class="btn btn-search">
                        🔍 Rechercher
                    </button>
                </div>
            </form>
        </section>

        <!-- Zone d'affichage des résultats - Dév 2 -->
        <section class="country-section" id="country-section" style="display: none;">
            <div class="country-container" id="country-container">
                <!-- Les détails du pays seront affichés ici -->
            </div>
        </section>

        <!-- Section des favoris - Dév 3 -->
        <section class="favorites-section" id="favorites-section" style="display: none;">
            <div class="favorites-header">
                <h2>Mes Pays Favoris (<span id="favorites-count">0</span>)</h2>
                <button id="toggle-favorites" class="btn btn-toggle">
                    📋 Afficher les favoris
                </button>
            </div>
            <div id="favorites-container" class="favorites-container">
                <!-- Les favoris seront affichés ici -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Geo Explorer - Données fournies par <a href="https://restcountries.com" target="_blank">REST
                Countries API</a></p>
    </footer>
</body>

</html>
